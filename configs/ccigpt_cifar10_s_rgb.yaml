exp_name: "ccigpt_cifar10_s_rgb"

# CC-iGPT RGB-domain ablation
# 与 ccigpt_cifar10_s.yaml 唯一差异：use_ycbcr=false
# 目的：量化 YCbCr (BT.601 + round 量化) 相对 RGB 直接建模的 bits/dim 收益，
# 同时给出一个可与 PixelCNN++ / Sparse Transformer 等 RGB-lossless 基线直接对齐的数。

model:
  type: ccigpt
  image_size: 32
  in_channels: 3
  vocab_size: 256
  pool_factor: 4

  d_model: 512
  N: 24
  h: 8
  d_ff: 1376
  dropout: 0.0

  coarse_d_model: 256
  coarse_N: 6
  coarse_h: 4
  coarse_d_ff: 688

  use_ycbcr: false              # ablation 主开关：关掉 BT.601 + round 量化
  activation_checkpointing: true

data:
  dataset: "cifar10"
  train: datasets/
  valid: datasets/
  num_workers: 8

train:
  amp_dtype: "bf16"
  batch_size: 64
  grad_accum_steps: 2
  lr: 3e-4
  eps: 1e-8
  epochs: 50                    # CIFAR-10 上 CC-iGPT 已知 ep20 早停, 50 ≈ 2.5× buffer 防过拟合
  log_freq: 50
  clip_max_norm: 1.0
  z_loss_weight: 1e-4
  lr_schedule: "cosine"
  warmup_epochs: 3              # 6% epochs
  compile: false
  swa:
    enabled: true
    start_epoch: 45             # 最后 5 epoch 启动 SWA（90% epochs）
    update_interval: 1

eval:
  interval: 2                   # ep20 前后过拟合反弹观测窗口，间隔收紧到 2

checkpoint:
  save_interval: 5
