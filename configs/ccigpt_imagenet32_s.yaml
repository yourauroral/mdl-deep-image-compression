exp_name: "ccigpt_imagenet32_s"

# Coarse-Conditioned iGPT on ImageNet 32×32
# 用于验证 CC-iGPT 在 CIFAR-10 过拟合是容量/数据 mismatch 而非结构 bug。
# ImageNet32 (~1.28M) 数据量足够，预期 fine 76M 不再早过拟合，BPP_total 持续下降。

model:
  type: ccigpt
  image_size: 32
  in_channels: 3
  vocab_size: 256
  pool_factor: 4               # 32 → 8（coarse 192 tokens, ~6% overhead）

  # fine 模型（iGPT-S 配置，~76M）
  d_model: 512
  N: 24
  h: 8
  d_ff: 1376
  dropout: 0.0

  # coarse 模型
  coarse_d_model: 256
  coarse_N: 6
  coarse_h: 4
  coarse_d_ff: 688

  use_ycbcr: true
  activation_checkpointing: true

data:
  dataset: "imagenet32_npy"
  train: datasets/imagenet32_hf
  valid: datasets/imagenet32_hf
  num_workers: 8

train:
  amp_dtype: "bf16"
  batch_size: 64
  grad_accum_steps: 2
  lr: 3e-4
  eps: 1e-8
  epochs: 120
  log_freq: 200
  clip_max_norm: 1.0
  z_loss_weight: 1e-4
  lr_schedule: "cosine"
  warmup_epochs: 6
  compile: false
  swa:
    enabled: true
    start_epoch: 108
    update_interval: 1

eval:
  interval: 5

checkpoint:
  save_interval: 2
