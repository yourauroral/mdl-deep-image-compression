exp_name: "hyperprior_mse_lmbda0.01"  

model:
  type: hyperprior
  N: 128
  M: 192

data:
  train: "datasets/div2k/train"
  valid: "datasets/div2k/valid"
  test:
    kodak: "datasets/kodak/test"
    clic: "datasets/clic2020/professional"
    tecnick: "datasets/tecnick/sampling"
  patch_size: 256
  num_workers: 4

train:
  epochs: 100
  batch_size: 8
  lr: 1.0e-4
  lmbda: 0.01            
  loss: "mse"
  clip_max_norm: 1.0
  seed: 42
  lr_milestones: [60, 85]  
  lr_gamma: 0.1
  log_freq: 100
 

eval:
  interval: 10

checkpoint:
  save_dir: "experiments/hyperprior_mse_lmbda0.01/checkpoints"
  save_interval: 10