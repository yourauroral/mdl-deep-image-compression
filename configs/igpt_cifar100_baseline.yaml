exp_name: "igpt_cifar100_baseline"

model:
  type: igpt
  image_size: 32
  in_channels: 3
  vocab_size: 256
  d_model: 256
  N: 8
  h: 8
  d_ff: 688       # SwiGLU hidden dim: (8/3)*d_model=682, 向上取整到16的倍数=688
                  # Ref: Shazeer arXiv:2002.05202; LLaMA arXiv:2302.13971
  dropout: 0.1
  # 消融开关
  use_ycbcr: true
  use_rope: true
  use_post_norm: true
  use_swiglu: true
  use_qk_norm: true
  use_depth_scaled_init: true
  use_zloss: true
  use_subpixel_ar: false
  activation_checkpointing: false

data:
  dataset: "cifar100"
  train: datasets/
  valid: datasets/
  num_workers: 8

train:
  amp_dtype: "bf16"
  batch_size: 64
  grad_accum_steps: 16
  lr: 1e-4
  eps: 1e-8
  epochs: 200
  log_freq: 100
  clip_max_norm: 1.0
  z_loss_weight: 1e-4
  lr_schedule: "cosine"
  warmup_epochs: 5
  stable_epochs: 140
  decay_beta: 1.0
  compile: false
  swa:
    enabled: false
    start_epoch: 160
    update_interval: 1
  mup:
    enabled: false
    base_width: 64
  muon:
    enabled: false
    lr: 0.02
    momentum: 0.95
    ns_steps: 5

eval:
  interval: 5

checkpoint:
  save_interval: 10
