exp_name: "igpt_cifar10_baseline"

model:
  type: igpt
  image_size: 32
  in_channels: 3
  vocab_size: 256
  d_model: 128
  N: 2
  h: 4
  d_ff: 384       # SwiGLU hidden dim: (8/3)*d_model=341, 向上取整到64的倍数=384
                  # Ref: Shazeer arXiv:2002.05202; LLaMA arXiv:2302.13971; CS336
  dropout: 0.1
  use_mtp: false

data:
  dataset: "cifar10"    # cifar10 或 cifar100
  train: datasets/
  valid: datasets/
  patch_size: null
  num_workers: 4

train:
  amp_dtype: "bf16"
  batch_size: 64
  grad_accum_steps: 8
  lr: 1e-4
  eps: 1e-8
  epochs: 100
  log_freq: 100
  clip_max_norm: 1.0
  lmbda: 0.01
  z_loss_weight: 1e-4
  mtp_weight: 0.1
  lr_schedule: "cosine"
  warmup_epochs: 5

eval:
  interval: 5

checkpoint:
  save_interval: 10
