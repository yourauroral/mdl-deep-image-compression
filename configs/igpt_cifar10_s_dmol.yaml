exp_name: "igpt_cifar10_s_dmol"

# iGPT-S + DMoL 输出头 (RGB-bit-exact 域主路径)
#
# 与 igpt_cifar10_s_rgb.yaml 的差异：
#   - output_head: "dmol" + n_mixtures: 10（替代 softmax-256）
#   - color_transform: "none"（DMoL 自带通道去相关，无需 BT.601/YCoCg-R 前端）
#   - use_subpixel_ar: false（DMoL 自身就是 pixel-AR，每位置一个 pixel）
#   - batch_size: 128（seq 1024 vs 3072，attention 显存降 9×，可加大 batch）
#   - epochs: 200 + warmup 10（对齐 igpt_cifar10_s.yaml；DMoL 收敛慢于 softmax）
#   - min_lr_ratio: 0.1（cosine 末段保 10% 峰值 LR，SWA-friendly）
#
# 目标：CIFAR-10 RGB-bit-exact 域 bpd ≤ 3.05（保底）/ ≤ 2.95（冲刺，PixelCNN++ 档）
# 论据：DMoL 内置 μG = f(R)、μB = g(R, G) 的线性 AR，等价于学习色彩去相关；
#       这是 PixelCNN++ / Image Transformer / PixelSNAIL / Sparse Transformer
#       等 RGB-bit-exact ≤3.0 文献的共同选择。
# Ref: Salimans et al., "PixelCNN++," ICLR 2017, §2.2

model:
  type: igpt
  image_size: 32
  in_channels: 3
  vocab_size: 256               # input embedding 仍 256（DMoL output 不依赖此值）
  d_model: 512
  N: 24
  h: 8
  d_ff: 1376
  dropout: 0.0
  output_head: "dmol"           # 主开关
  n_mixtures: 10                # 与 PixelCNN++ CIFAR-10 设置一致
  color_transform: "none"       # DMoL 自带通道去相关
  use_subpixel_ar: false        # DMoL 强制关闭（pixel-AR 由 output_head 触发）
  activation_checkpointing: true

data:
  dataset: "cifar10"
  train: datasets/
  valid: datasets/
  num_workers: 8

train:
  # DMoL 文献全部 fp32（PixelCNN++ / PixelSNAIL / Sparse Transformer），
  # bf16 下 DMoL CDF 差分易触发数值溢出导致 ep1 loss 飘升。amp_dtype=null
  # 保持 fp32 训练；显存代价用 batch/2 + grad_accum×2 补回。
  amp_dtype: null
  # seq 缩短 3× 后理论上可放大 batch，但 fp32 显存翻倍，所以回到 64；
  # effective batch = 64 * 2 (DDP) * 2 (grad_accum) = 256
  batch_size: 64
  grad_accum_steps: 2
  lr: 3e-4
  eps: 1e-8
  epochs: 200
  log_freq: 50
  clip_max_norm: 1.0
  z_loss_weight: 0.0            # DMoL 路径不需要 z-loss（无 logit 量级问题）
  lr_schedule: "cosine"
  warmup_epochs: 10             # 5% epochs
  min_lr_ratio: 0.1             # cosine 末段保 10% 峰值 LR，让 SWA 有效
  compile: false
  swa:
    enabled: true
    start_epoch: 180            # 最后 10% epoch 启动 SWA
    update_interval: 1

eval:
  interval: 5

checkpoint:
  save_interval: 10
