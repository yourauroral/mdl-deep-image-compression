exp_name: "igpt_cifar10_s_rgb"

# iGPT-S RGB-domain ablation
# 与 igpt_cifar10_s.yaml 唯一差异：use_ycbcr=false + 训练预算与 ccigpt_cifar10_s_rgb.yaml 对齐
# 目的：补齐 RGB 域的单尺度自回归基线，使 "iGPT vs CC-iGPT" 的双尺度增益论证
# 在 RGB 与 YCbCr 两个域内都可独立成立。同时给出与 PixelCNN++ /
# Sparse Transformer 等 RGB-bit-exact 基线直接对齐的单尺度 baseline 数。

model:
  type: igpt
  image_size: 32
  in_channels: 3
  vocab_size: 256
  d_model: 512
  N: 24
  h: 8
  d_ff: 1376
  dropout: 0.0
  use_ycbcr: false              # ablation 主开关：关掉 BT.601 + round 量化
  use_rope: true
  use_post_norm: true
  use_swiglu: true
  use_qk_norm: true
  use_depth_scaled_init: true
  use_zloss: true
  use_subpixel_ar: true
  activation_checkpointing: true

data:
  dataset: "cifar10"
  train: datasets/
  valid: datasets/
  num_workers: 8

train:
  amp_dtype: "bf16"
  batch_size: 64
  grad_accum_steps: 2
  lr: 3e-4
  eps: 1e-8
  epochs: 50                    # 与 ccigpt_cifar10_s_rgb.yaml 训练预算对齐, 保证 RGB 域内 ablation 公平
  log_freq: 50
  clip_max_norm: 1.0
  z_loss_weight: 1e-4
  lr_schedule: "cosine"
  warmup_epochs: 3              # 6% epochs
  stable_epochs: 35             # 仅 WSD 模式生效（cosine 模式不读此值）
  decay_beta: 1.0
  compile: false
  swa:
    enabled: true
    start_epoch: 45             # 最后 5 epoch 启动 SWA（90% epochs）
    update_interval: 1
  mup:
    enabled: false
    base_width: 64
  muon:
    enabled: false
    lr: 0.02
    momentum: 0.95
    ns_steps: 5

eval:
  interval: 2

checkpoint:
  save_interval: 5
