exp_name: "igpt_imagenet32_s"

# iGPT-S on ImageNet 32×32 (HF parquet → BOX resize → npy)
# ImageNet 32×32: ~1.28M train / 50k val
# 序列长度 3072 (32×32×3)，与 CIFAR 相同，但数据量大 25 倍
# Ref: Chrabaszcz et al., "A Downsampled Variant of ImageNet," 2017

model:
  type: igpt
  image_size: 32
  in_channels: 3
  vocab_size: 256
  d_model: 512
  N: 24
  h: 8
  d_ff: 1376
  dropout: 0.0
  use_ycbcr: true
  use_subpixel_ar: true
  activation_checkpointing: true

data:
  dataset: "imagenet32_npy"
  train: datasets/imagenet32_hf
  valid: datasets/imagenet32_hf
  num_workers: 8

train:
  amp_dtype: "bf16"
  # 2×H800 DDP: per-GPU batch=64, world_size=2, grad_accum=2
  # effective batch = 64 * 2 * 2 = 256
  batch_size: 64
  grad_accum_steps: 2
  lr: 3e-4
  eps: 1e-8
  # 与 CC-iGPT 同节奏（CIFAR-10 用 120ep，ImageNet32 数据量足够，120ep 足以判断是否仍过拟合）
  epochs: 120
  log_freq: 200
  clip_max_norm: 1.0
  z_loss_weight: 1e-4
  lr_schedule: "cosine"
  warmup_epochs: 6              # 5% epochs
  compile: false
  swa:
    enabled: true
    start_epoch: 108            # 90% epochs
    update_interval: 1

eval:
  interval: 5

checkpoint:
  save_interval: 10
