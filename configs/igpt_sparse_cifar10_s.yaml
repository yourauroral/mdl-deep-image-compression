exp_name: "igpt_sparse_cifar10_s"

# SparseIGPT-S: iGPT-S + Sparse Transformer 交替稀疏注意力
# 架构与 igpt_cifar10_s 完全相同（N=24, d_model=512），仅注意力模式不同：
#   偶数层: 局部窗口 [i-128, i]
#   奇数层: 步幅注意力 (i-j) % 128 == 0
# Ref: Child et al., "Generating Long Sequences with Sparse Transformers,"
#      arXiv:1904.10509, 2019. CIFAR-10 结果: 2.80 bits/dim

model:
  type: igpt_sparse
  image_size: 32
  in_channels: 3
  vocab_size: 256
  d_model: 512
  N: 24
  h: 8
  d_ff: 1376        # SwiGLU hidden dim: (8/3)*512≈1365, 向上取整到16倍数
  dropout: 0.0
  use_ycbcr: true
  use_rope: true
  use_post_norm: true
  use_swiglu: true
  use_qk_norm: true
  use_depth_scaled_init: true
  use_zloss: true
  use_subpixel_ar: true
  activation_checkpointing: true
  sparse_stride: 128   # stride l，CIFAR-10 (3072 tokens) 参考原论文取 128

data:
  dataset: "cifar10"
  train: datasets/
  valid: datasets/
  num_workers: 8

train:
  amp_dtype: "bf16"
  batch_size: 64
  grad_accum_steps: 2
  lr: 3e-4
  eps: 1e-8
  epochs: 200
  log_freq: 50
  clip_max_norm: 1.0
  z_loss_weight: 1e-4
  lr_schedule: "cosine"
  warmup_epochs: 10
  stable_epochs: 140
  decay_beta: 1.0
  compile: false
  swa:
    enabled: true
    start_epoch: 180
    update_interval: 1
  mup:
    enabled: false
    base_width: 64
  muon:
    enabled: false
    lr: 0.02
    momentum: 0.95
    ns_steps: 5

eval:
  interval: 5

checkpoint:
  save_interval: 10
