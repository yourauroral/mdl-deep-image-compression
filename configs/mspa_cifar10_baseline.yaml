exp_name: "mspa_cifar10_baseline"

# MSPA (Multi-Scale Pixel Autoregression) baseline on CIFAR-10
# 6 scales: 1+4+16+64+256+1024 = 1365 pixels × 3 ch = 4095 tokens, vocab=256
# 目标 BPP < 3.2（借助粗尺度全局上下文，相对 iGPT 3.77 降低）

model:
  type: mspa
  image_size: 32
  in_channels: 3
  vocab_size: 256
  d_model: 512
  N: 24
  h: 8
  d_ff: 1376             # (8/3)*512≈1365, 向上取整到 16 倍数
  dropout: 0.0
  num_scales: 6
  use_ycbcr: true
  use_rope: true
  use_post_norm: true
  use_swiglu: true
  use_qk_norm: true
  use_depth_scaled_init: true
  use_zloss: true
  activation_checkpointing: true   # seq_len=4094 比 iGPT 大, 必开

data:
  dataset: "cifar10"
  train: datasets/
  valid: datasets/
  num_workers: 8

train:
  amp_dtype: "bf16"
  batch_size: 32          # seq_len 比 iGPT 大 1/3, 相应降 batch
  grad_accum_steps: 4     # effective batch = 32 * 2 * 4 = 256
  lr: 3e-4
  eps: 1e-8
  epochs: 200
  log_freq: 50
  clip_max_norm: 1.0
  z_loss_weight: 1e-4
  lr_schedule: "cosine"
  warmup_epochs: 10
  stable_epochs: 140
  decay_beta: 1.0
  compile: false
  swa:
    enabled: true
    start_epoch: 180
    update_interval: 1
  mup:
    enabled: false
    base_width: 64
  muon:
    enabled: false
    lr: 0.02
    momentum: 0.95
    ns_steps: 5

eval:
  interval: 5

checkpoint:
  save_interval: 10
