exp_name: "mspa_imagenet32_s"

# MSPA-S on ImageNet 32×32 (downsampled)
# 6 scales, 4095 tokens, vocab=256
# ImageNet 32×32: ~1.28M train / 50k val

model:
  type: mspa
  image_size: 32
  in_channels: 3
  vocab_size: 256
  d_model: 512
  N: 24
  h: 8
  d_ff: 1376
  dropout: 0.0
  num_scales: 6
  use_ycbcr: true
  use_rope: true
  use_post_norm: true
  use_swiglu: true
  use_qk_norm: true
  use_depth_scaled_init: true
  use_zloss: true
  activation_checkpointing: true

data:
  dataset: "imagenet32"
  train: datasets/imagenet32
  valid: datasets/imagenet32
  num_workers: 8

train:
  amp_dtype: "bf16"
  # seq_len=4094 比 iGPT 大 1/3，降 batch 保显存
  batch_size: 32
  grad_accum_steps: 4     # effective batch = 32 * 2 * 4 = 256
  lr: 3e-4
  eps: 1e-8
  epochs: 100
  log_freq: 200
  clip_max_norm: 1.0
  z_loss_weight: 1e-4
  lr_schedule: "cosine"
  warmup_epochs: 5
  stable_epochs: 70
  decay_beta: 1.0
  compile: false
  swa:
    enabled: true
    start_epoch: 90
    update_interval: 1
  mup:
    enabled: false
    base_width: 64
  muon:
    enabled: false
    lr: 0.02
    momentum: 0.95
    ns_steps: 5

eval:
  interval: 5

checkpoint:
  save_interval: 10
