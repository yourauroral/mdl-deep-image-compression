exp_name: "var_cifar10"

model:
  type: var
  image_size: 32
  num_scales: 6           # 1×1, 2×2, 4×4, 8×8, 16×16, 32×32
  num_embeddings: 512     # VQVAE codebook 大小 = VAR vocab size
  d_model: 512
  N: 12
  h: 8
  d_ff: 1376              # SwiGLU: (8/3)*512=1365 → 1376 (16的倍数)
  dropout: 0.0
  use_rope: true
  use_post_norm: true
  use_swiglu: true
  use_qk_norm: true
  use_depth_scaled_init: true
  use_zloss: true
  activation_checkpointing: false

  # 预训练 VQVAE checkpoint 路径（训练 VAR 时 VQVAE frozen）
  vqvae_checkpoint: "experiments/vqvae_cifar10/checkpoints/best.pth"
  # VQVAE 配置（用于构建 VQVAE 模型）
  vqvae:
    image_size: 32
    in_channels: 3
    hidden_dim: 128
    embed_dim: 256
    num_embeddings: 512
    num_scales: 6
    commitment_weight: 0.25
    ema_decay: 0.99

data:
  dataset: "cifar10"
  train: datasets/
  valid: datasets/
  num_workers: 8

train:
  amp_dtype: "bf16"
  batch_size: 128
  grad_accum_steps: 2       # effective batch = 256
  lr: 3e-4
  eps: 1e-8
  epochs: 300
  log_freq: 50
  clip_max_norm: 1.0
  z_loss_weight: 1e-4
  lr_schedule: "cosine"
  warmup_epochs: 10
  compile: false
  swa:
    enabled: true
    start_epoch: 260
    update_interval: 1

eval:
  interval: 5

checkpoint:
  save_interval: 10
